<!DOCTYPE html>
<html lang="tr">
    <head>
        <meta charset="UTF-8">
        <title>JavaScript ile mesaj</title>
    </head>
    <body>
        <h1>Sayfa Başlığı</h1>
        <p id="yazi1">Bu bir paragraftır.</p>
        <script>
            document.getElementById("yazi1").innerText="Bu yazı javascript ile değiştirilmiştir.";
            console.log("bu console.log() mesajıdır.");
            document.write("bu document.write() mesajıdır.");
            alert("bu alert() mesajıdır.");
        </script>
    </body>
</html>

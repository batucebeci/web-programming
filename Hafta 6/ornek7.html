<!DOCTYPE html>
<html lang="tr">
    <head>
        <meta charset="UTF-8">
        <title>var komutları</title>
    </head>
    <body>
        <h1>sayfa başlığı</h1>
        <script>
            var a;
            var b=50;
            var c=3.14;
            var d="merhaba";
            var e="dünya";
            f=80; //var kullanılmadığında global
            document.write("a=" + a + "</br>");
            document.write("b=" + b + "</br>");
            document.write("c=" + c + "</br>");
            document.write("d=" + d + "</br>");
            document.write("e=" + e + "</br>");
            document.write("f=" + f + "</br>");
        </script>
    </body>
</html>

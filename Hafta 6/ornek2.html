<!DOCTYPE html>
<html lang="tr">
    <head>
        <meta charset="UTF-8">
        <title>Web Sayfası Başlığı</title>
        <script>
            function sayfaAdresiniGoster(){
                document.write("Bu sayfanın başlığı=" +document.title);
            }
        </script>
    </head>
    <body>
        <h1>Sayfa Başlığı</h1>
        <p>Bu bir web sayfasıdır.Sayfadaki ilk paragraf budur.</p>
        <script>
            sayfaAdresiniGoster();
        </script>
    </body>
</html>

<html>
    <head>
        <script src="jquery.js"></script>
        <script>
            $(document).ready(function(){
                $("button.b1").click(function(){
                    $("#div1").fadeIn();
                    $("#div2").fadeIn("slow");
                    $("#div3").fadeIn(3000);
                });
                $("button.b2").click(function(){
                    $("#div1").fadeOut();
                    $("#div2").fadeOut("slow");
                    $("#div3").fadeOut(3000); 
                });
                $("button.b3").click(function(){
                    $("#div1").fadeToggle();
                    $("#div2").fadeToggle("slow");
                    $("#div3").fadeToggle(3000);
                });
                $("button.b4").click(function(){
                    $("#div1").fadeTo("slow", 0.15);
                    $("#div2").fadeTo("slow", 0.4);
                    $("#div3").fadeTo("slow", 0.7);
                })
            });
        </script>
    </head>
    <body>
        <h1>İfade fonksiyonu örnek uygulaması</h1>
        <button class="b1"> Kutuları görüntülemek için tıklayınız!</button><br><br>
        <button class="b2">Kutuları gizlemek için tıklayınız!</button><br><br>
        <button class="b3">Kutuları gizleyip göstermek için tıklayınız</button><br><br>
        <button class="b4">Kutuları saydam hale getirmek için tıklayınız!</button><br><br>
        <div id="div1" style="width: 80px;height: 80px;display: none;background-color: red;"></div><br>
        <div id="div2" style="width: 80px;height: 80px;display: none;background-color: aqua;"></div><br>
        <div id="div3" style="width: 80px;height: 80px;display: none;background-color: darkmagenta;"></div>
    </body>
</html>

<!DOCTYPE html>
<html>
    <head>
        <script src="jquery.js"></script>
        <script>
            $(document).ready(function(){
                $("button").click(function(){
                    $("button").click(function(){
                        $("p").toggle();
                    }); 
                });
            });
        </script>
    </head>
    <body>
        <button>Hem gizle , hem göster!</button>
        <p>Bu paragraf butona ilk tıklanığında gizlenecek, butona ikinci tıklanığında görünür hale gelecek.</p>
    </body>
</html>

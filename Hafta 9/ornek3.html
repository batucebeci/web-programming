<!DOCTYPE html>
<html>
    <head>
        <script src="jquery.js"></script>
        <script>
            $(document).ready(function(){
                $("button").click(function(){
                    $("p.ilk").hide();
                });
            });
        </script>
    </head>
    <body>
        <h2>jQuery'e hoşgeldiniz.</h2>
        <p class="ilk">jQuery bir JavaScript kütüphanesidir</p>
        <p>Hızlı ve kolay JS kodlama yapmanızı sağlar.</p>
        <button>Paragrafları gizlemek için tıklayınız.</button>
    </body>
</html>

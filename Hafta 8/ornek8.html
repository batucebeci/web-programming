<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="bilgi"></p>
    <script>
        alert("JavaScript ünitisine hoş geldiniz");
        if(confirm("Javascript bir betik dilidir"))
        {
            metin="Tamama basıldı";
        }
    else
    
        metin="İptale basıldı";
    
        document.getElementById("bilgi").innerText=metin;

    var isim = prompt("Adınız giriniz:" , "adınız");
    if(isim!=null)
    {
        metin="Merhaba " + isim;
    }
    else
    
        metin="İptale basıldı";
        document.getElementById("bilgi").innerText=metin;
    
    </script>
</body>
</html>

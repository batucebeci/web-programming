<html>
    <head>
        <meta charset="UTF-8">
        <title>Stiller</title>
        <style type="text/css">
            ul.i{list-style-type: circle;}
            ul.ii{list-style-type: square;}
            ol.i{list-style-type: decimal-leading-zero;}
        </style>
    </head>
    <body>
        <ul class="ii">
            <li>EBYU</li>
            <li>Mühendislik Fakültesi</li>
            <li>Erzincan</li>
        </ul>
        <ul class="i">
            <li>EBYU</li>
            <li>Mühendislik Fakültesi</li>
            <li>Erzincan</li>
        </ul>
        <ol class="i">
            <li>EBYU</li>
            <li>Mühendislik Fakültesi</li>
            <li>Erzincan</li>
        </ol>
    </body>
</html>

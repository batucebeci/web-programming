<html>
    <head>
        <title>Stiller</title>
        <style type="text/css">
            h3.ust{text-decoration: overline;}
            h3.alt{text-decoration: underline;}
            h3.uzeri{text-decoration: line-through;}
        </style>
    </head>
    <body>
        <h3 class="ust">h3 etiketi cizgi metnin ustunde(overline)</h3>
        <h3 class="alt">h3 etiketi cizgi metinin alında(underline)</h3>
        <h3 class="uzeri">h3 etiketi cizhi metnin üzerinde(line-through)</h3>
    </body>
</html>
